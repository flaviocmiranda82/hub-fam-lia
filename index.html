<script>

const { useState, useEffect } = React;
const html = htm.bind(React.createElement);

const SUPABASE_URL = "https://xbtpnhfnvgqhtrmihdcp.supabase.co";
const SUPABASE_KEY = "sb_publishable_9yEbAQJJN32egUz0oSXXXw_TmLMUW8J";
const __mem={};
const __store={getItem:function(k){try{return localStorage.getItem(k);}catch(e){return __mem[k]||null;}},setItem:function(k,v){try{localStorage.setItem(k,v);}catch(e){__mem[k]=v;}},removeItem:function(k){try{localStorage.removeItem(k);}catch(e){delete __mem[k];}}};
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth:{ storage: __store, persistSession:true, autoRefreshToken:true, detectSessionInUrl:false } });

const COR = { meninas:"#EC6A4C", pais:"#2E8B83", meninasBg:"#FDEEE9", paisBg:"#E7F2F0" };
const MESES=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const MESES_L=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const DIAS=["domingo","segunda","terça","quarta","quinta","sexta","sábado"];
const pData=(iso)=>{const a=(iso||"").split("-").map(Number);return(a[0]&&a[1]&&a[2])?new Date(a[0],a[1]-1,a[2]):null;};
const fCurta=(iso)=>{const d=pData(iso);return d?DIAS[d.getDay()].slice(0,3)+", "+d.getDate()+" de "+MESES[d.getMonth()]:"—";};
const fLonga=(iso)=>{const d=pData(iso);return d?DIAS[d.getDay()]+", "+d.getDate()+" de "+MESES_L[d.getMonth()]:"—";};
const dAte=(iso)=>{const d=pData(iso);if(!d)return null;const h=new Date();h.setHours(0,0,0,0);return Math.round((d-h)/864e5);};
const falta=(iso)=>{const n=dAte(iso);if(n===null)return"";if(n<0)return"já passou";if(n===0)return"é hoje";if(n===1)return"é amanhã";return"faltam "+n+" dias";};
function semanaAtual(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+3-((d.getDay()+6)%7));const s=new Date(d.getFullYear(),0,4);const n=1+Math.round(((d-s)/864e5-3+((s.getDay()+6)%7))/7);return d.getFullYear()+"-W"+String(n).padStart(2,"0");}

async function desenhar(ev){
  await (document.fonts?document.fonts.ready:Promise.resolve());
  const s=2,W=680,P=44,cor=ev.festa_infantil?COR.meninas:COR.pais,corBg=ev.festa_infantil?COR.meninasBg:COR.paisBg;
  const linhas=[["DATA",fLonga(ev.data)],["HORÁRIO",ev.inicio?(ev.inicio+(ev.fim?" – "+ev.fim:"")):"a confirmar"],["LOCAL",ev.local||"a confirmar"],[ev.festa_infantil?"ANIVERSARIANTE":"ENVOLVE",ev.convidado||"—"]];
  if(ev.responsavel)linhas.push(["LOGÍSTICA","Quem leva: "+ev.responsavel]);
  const H=250+linhas.length*64,c=document.createElement("canvas");c.width=W*s;c.height=H*s;const x=c.getContext("2d");x.scale(s,s);
  const rr=(a,b,w,h,r)=>{x.beginPath();x.moveTo(a+r,b);x.arcTo(a+w,b,a+w,b+h,r);x.arcTo(a+w,b+h,a,b+h,r);x.arcTo(a,b+h,a,b,r);x.arcTo(a,b,a+w,b,r);x.closePath();};
  x.fillStyle="#FBF6EF";x.fillRect(0,0,W,H);x.fillStyle="#fff";rr(20,20,W-40,H-40,26);x.fill();x.fillStyle=cor;rr(20,20,12,H-40,6);x.fill();
  x.textBaseline="top";x.fillStyle="#857A8C";x.font="700 13px 'Space Mono',monospace";x.fillText("L E M B R E T E   •   F A M Í L I A",P,44);
  x.fillStyle="#2A2233";x.font="800 34px 'Bricolage Grotesque',sans-serif";
  const pal=(ev.titulo||"Evento").split(" ");let l1="",l2="";for(const p of pal){const t=(l1?l1+" ":"")+p;if(x.measureText(t).width<W-2*P-20&&!l2)l1=t;else l2=(l2?l2+" ":"")+p;}
  x.fillText(l1,P,72);if(l2)x.fillText(l2,P,110);let y=l2?158:124;
  linhas.forEach(function(par){x.fillStyle="#857A8C";x.font="700 11px 'Space Mono',monospace";x.fillText(par[0],P,y);x.fillStyle="#2A2233";x.font="500 18px 'Inter',sans-serif";x.fillText(par[1],P,y+18);y+=64;});
  const sel=falta(ev.data).toUpperCase();x.font="700 13px 'Space Mono',monospace";const sw=x.measureText(sel).width+28;
  x.fillStyle=corBg;rr(P,y+2,sw,34,17);x.fill();x.fillStyle=cor;x.fillText(sel,P+14,y+13);
  return new Promise(function(r){c.toBlob(function(b){r(b);},"image/png");});
}
async function compartilhar(ev,toast){
  const blob=await desenhar(ev),file=new File([blob],"lembrete.png",{type:"image/png"});
  const txt="📌 "+ev.titulo+" — "+fCurta(ev.data)+(ev.inicio?" às "+ev.inicio:"")+(ev.local?" • "+ev.local:"")+(ev.responsavel?" • Leva: "+ev.responsavel:"");
  try{ if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],text:txt});return;} throw 0; }
  catch(e){ if(e&&e.name==="AbortError")return; const u=URL.createObjectURL(blob),a=document.createElement("a");a.href=u;a.download="lembrete.png";a.click();URL.revokeObjectURL(u); try{await navigator.clipboard.writeText(txt);}catch(_){}; toast("Imagem baixada e texto copiado. Abra o WhatsApp e envie."); }
}

function Login(props){
  const toast=props.toast;
  const [email,setEmail]=useState(""),[senha,setSenha]=useState(""),[modo,setModo]=useState("entrar"),[carregando,setCarregando]=useState(false);
  async function ok(){
    if(!email||!senha){toast("Preencha e-mail e senha.");return;}
    setCarregando(true);
    const r = await (modo==="entrar" ? sb.auth.signInWithPassword({email:email,password:senha}) : sb.auth.signUp({email:email,password:senha}));
    setCarregando(false);
    if(r.error) toast(r.error.message);
    else if(modo==="criar") toast("Conta criada! Agora toque em Entrar.");
  }
  return html`
    <div className="wrap" style=${{paddingTop:60}}>
      <div className="eyebrow">Hub da Família</div>
      <div className="h1">${modo==="entrar"?"Entrar":"Criar conta"}</div>
      <div className="card" style=${{padding:16,marginTop:18,display:"flex",flexDirection:"column",gap:13}}>
        <div><span className="label">E-mail</span><input className="input" value=${email} onChange=${function(e){setEmail(e.target.value);}} placeholder="seu@email.com"/></div>
        <div><span className="label">Senha</span><input className="input" type="password" value=${senha} onChange=${function(e){setSenha(e.target.value);}} onKeyDown=${function(e){if(e.key==="Enter")ok();}}/></div>
      </div>
      <button className="btn btn-primary" style=${{marginTop:14}} disabled=${carregando} onClick=${ok}>${carregando?"...":(modo==="entrar"?"Entrar":"Criar conta")}</button>
      <div className="note" style=${{textAlign:"center",marginTop:12}} onClick=${function(){setModo(modo==="entrar"?"criar":"entrar");}}>${modo==="entrar"?"Primeira vez? Toque para criar conta":"Já tem conta? Toque para entrar"}</div>
    </div>`;
}

function escICS(s){return String(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");}
function icsData(d,t){const dd=String(d||"").replace(/-/g,"");if(!t)return dd;return dd+"T"+String(t).replace(":","")+"00";}
function maisUmaHora(t){const p=String(t).split(":");let h=Number(p[0]||0),m=Number(p[1]||0);h=(h+1)%24;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");}
function proximoDia(d){const dt=new Date(d+"T00:00:00");dt.setDate(dt.getDate()+1);return dt.toISOString().slice(0,10);}
function baixarICS(ev){
  const stamp=new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  const temHora=!!ev.inicio;
  let dtStart,dtEnd;
  if(temHora){dtStart="DTSTART:"+icsData(ev.data,ev.inicio);const fim=ev.fim||maisUmaHora(ev.inicio);dtEnd="DTEND:"+icsData(ev.data,fim);}
  else{dtStart="DTSTART;VALUE=DATE:"+icsData(ev.data,"");dtEnd="DTEND;VALUE=DATE:"+icsData(proximoDia(ev.data),"");}
  const linhas=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Hub da Familia//PT-BR","CALSCALE:GREGORIAN","BEGIN:VEVENT","UID:"+(ev.id||Date.now())+"@hubfamilia","DTSTAMP:"+stamp,dtStart,dtEnd,"SUMMARY:"+escICS(ev.titulo),ev.local?"LOCATION:"+escICS(ev.local):"",ev.convidado?"DESCRIPTION:"+escICS("Aniversariante/convidado: "+ev.convidado):"","END:VEVENT","END:VCALENDAR"].filter(Boolean);
  const ics=linhas.join("\r\n");
  const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=(ev.titulo||"evento").replace(/[^a-z0-9]/gi,"_")+".ics";
  document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
}

function Agenda(props){
  const toast=props.toast;
  const vazio={titulo:"",data:"",inicio:"",fim:"",local:"",convidado:"",festa_infantil:false,responsavel:""};
  const [eventos,setEventos]=useState([]),[abrir,setAbrir]=useState(false),[n,setN]=useState(vazio),[lendo,setLendo]=useState(false);
  const carregar=async function(){const r=await sb.from("eventos").select("*").order("data");setEventos(r.data||[]);};
  useEffect(function(){carregar();const ch=sb.channel("ev").on("postgres_changes",{event:"*",schema:"public",table:"eventos"},carregar).subscribe();return function(){sb.removeChannel(ch);};},[]);
  async function salvar(){ if(!n.titulo.trim()){toast("Dê um nome ao evento.");return;} const r=await sb.from("eventos").insert(n); if(r.error)toast(r.error.message); else{setN(vazio);setAbrir(false);} }
  async function apagar(id){ await sb.from("eventos").delete().eq("id",id); }
  const up=function(k,v){setN(function(p){const o=Object.assign({},p);o[k]=v;return o;});};
  async function prepararImagem(file){const bmp=await createImageBitmap(file);const max=1568;let w=bmp.width,h=bmp.height;if(Math.max(w,h)>max){const r=max/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r);}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(bmp,0,0,w,h);const url=c.toDataURL("image/jpeg",0.85);return{base64:url.split(",")[1],mediaType:"image/jpeg"};}
  async function lerConvite(e){const file=e.target.files&&e.target.files[0];if(!file)return;setLendo(true);try{const img=await prepararImagem(file);const r=await sb.functions.invoke("ler-convite",{body:{imagem:img.base64,mediaType:img.mediaType}});if(r.error)throw r.error;const d=r.data||{};setN({titulo:d.titulo||"",data:d.data||"",inicio:d.inicio||"",fim:d.fim||"",local:d.local||"",convidado:d.convidado||"",festa_infantil:!!d.festa_infantil,responsavel:""});setAbrir(true);}catch(err){toast("Não consegui ler o convite. Preencha à mão.");setN(vazio);setAbrir(true);}finally{setLendo(false);e.target.value="";}}
  return html`
    <div className="wrap">
      <div className="eyebrow">Agenda</div>
      <div className="h1">Eventos da família</div>
      ${!abrir
        ? html`<div style=${{marginTop:14,display:"flex",flexDirection:"column",gap:8}}>
            <button className="btn btn-primary" disabled=${lendo} onClick=${function(){document.getElementById("conviteFile").click();}}>${lendo?"Lendo convite…":"📷 Enviar convite (preenche sozinho)"}</button>
            <button className="btn btn-ghost" onClick=${function(){setN(vazio);setAbrir(true);}}>+ Novo evento (à mão)</button>
            <input id="conviteFile" type="file" accept="image/*" style=${{display:"none"}} onChange=${lerConvite}/>
          </div>`
        : html`<div className="card" style=${{padding:16,marginTop:14,display:"flex",flexDirection:"column",gap:12}}>
            <div><span className="label">Evento</span><input className="input" value=${n.titulo} onChange=${function(e){up("titulo",e.target.value);}} placeholder="Ex: Aniversário da Manu"/></div>
            <div><span className="label">Data</span><input className="input" type="date" value=${n.data} onChange=${function(e){up("data",e.target.value);}}/></div>
            <div style=${{display:"flex",gap:11}}>
              <div style=${{flex:1}}><span className="label">Início</span><input className="input" type="time" value=${n.inicio} onChange=${function(e){up("inicio",e.target.value);}}/></div>
              <div style=${{flex:1}}><span className="label">Fim</span><input className="input" type="time" value=${n.fim} onChange=${function(e){up("fim",e.target.value);}}/></div>
            </div>
            <div><span className="label">Local</span><input className="input" value=${n.local} onChange=${function(e){up("local",e.target.value);}}/></div>
            <div><span className="label">Convidado / aniversariante</span><input className="input" value=${n.convidado} onChange=${function(e){up("convidado",e.target.value);}}/></div>
            <div><span className="label">De quem é</span>
              <div style=${{display:"flex",gap:8}}>
                <div className="seg" onClick=${function(){up("festa_infantil",false);}} style=${!n.festa_infantil?{borderColor:COR.pais,background:COR.paisBg,color:COR.pais}:{}}>Casal / pais</div>
                <div className="seg" onClick=${function(){up("festa_infantil",true);}} style=${n.festa_infantil?{borderColor:COR.meninas,background:COR.meninasBg,color:COR.meninas}:{}}>Das meninas</div>
              </div>
            </div>
            ${n.festa_infantil?html`<div><span className="label">Quem leva / busca</span><input className="input" value=${n.responsavel} onChange=${function(e){up("responsavel",e.target.value);}}/></div>`:null}
            <div style=${{display:"flex",gap:8}}><button className="btn btn-primary" style=${{flex:1}} onClick=${salvar}>Guardar</button><button className="btn btn-ghost" onClick=${function(){setAbrir(false);}}>Cancelar</button></div>
          </div>`}
      <div className="eyebrow" style=${{margin:"22px 2px 12px"}}>Próximos</div>
      ${eventos.length===0
        ? html`<div className="card" style=${{padding:24,textAlign:"center"}}><div style=${{fontWeight:600}}>Nada marcado ainda</div></div>`
        : html`<div style=${{display:"flex",flexDirection:"column",gap:11}}>${eventos.map(function(ev){const cor=ev.festa_infantil?COR.meninas:COR.pais;const corBg=ev.festa_infantil?COR.meninasBg:COR.paisBg;return html`
            <div className="card" key=${ev.id} style=${{display:"flex",overflow:"hidden",padding:0}}>
              <div style=${{width:8,background:cor}}></div>
              <div style=${{padding:"14px 14px 14px 16px",flex:1,minWidth:0}}>

}

const CATS={Essencial:{pts:1,emoji:"🌱",cor:"#2E8B83"},Crescimento:{pts:2,emoji:"🌟",cor:"#C99A2E"},Extra:{pts:4,emoji:"🎁",cor:"#EC6A4C"}};

const JORNADA=["Dia da Fé e da Gratidão","Início da Jornada","Trilha da Responsabilidade","Desafio da Coragem","Missão da Gentileza","Reta Final","Dia das Missões Extras"];

};
function Pote(props){
  var frac=Math.max(0,Math.min(props.frac||0,1));
  var W=props.w||100, H=Math.round(W*1.46);
  var topo=46, base=156, alt=base-topo;
  var fillH=alt*frac, yFill=base-fillH;
  var cor=props.destravado?"#EC6A4C":"#C9B79C";
  var y80=base-alt*(0.8/1.2);
  return html`<svg viewBox="0 0 120 175" width=${W} height=${H} style=${{flexShrink:0}}>
    <defs><clipPath id="jarc"><rect x="24" y="46" width="72" height="110" rx="18"/></clipPath></defs>
    <rect x="34" y="30" width="52" height="20" rx="9" fill="#fff" stroke="#E3D8C9" stroke-width="2"/>
    <rect x="24" y="46" width="72" height="110" rx="18" fill="#FBF6EF" stroke="#E3D8C9" stroke-width="2"/>
    <rect className="pote-liq" x="24" width="72" y=${yFill} height=${fillH} fill=${cor} clip-path="url(#jarc)" opacity="0.92"/>
    <line x1="24" x2="96" y1=${y80} y2=${y80} stroke="#2A2233" stroke-width="1.6" stroke-dasharray="4 4" opacity=".5" clip-path="url(#jarc)"/>
    ${props.destravado?html`<text x="60" y="66" text-anchor="middle" font-size="20">✨</text>`:null}
  </svg>`;
}

function hojeLocal(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

function Missoes(props){
  const toast=props.toast, papel=props.papel;
  const semana=semanaAtual(), pai=(papel==="pai"||papel==="mae"), hoje=hojeLocal();
  const diaSem=new Date().getDay();
  const vazio={titulo:"",categoria:"Essencial",pontos:1,responsavel:"",frequencia:"diaria",recorrente:true,dias:[0,1,2,3,4,5,6]};
  const [modelos,setModelos]=useState([]),[checks,setChecks]=useState([]);
  const [abrir,setAbrir]=useState(false),[n,setN]=useState(vazio);
  const [meta,setMeta]=useState(null),[valorForm,setValorForm]=useState(10),[abrirVal,setAbrirVal]=useState(false);
  const [filhaAtiva,setFilhaAtiva]=useState(""),[avaliando,setAvaliando]=useState(null),[festa,setFesta]=useState(false);
  const carregar=async function(){const a=await sb.from("missoes_modelo").select("*").eq("ativa",true).or("recorrente.eq.true,semana.eq."+semana).order("criado_em");setModelos(a.data||[]);const b=await sb.from("checkins").select("*").eq("semana",semana);setChecks(b.data||[]);};
  const carregarMeta=async function(){const r=await sb.from("metas").select("*").eq("semana",semana).maybeSingle();if(r.data){setMeta(r.data);setValorForm(r.data.valor);}else{setMeta(null);}};
  useEffect(function(){carregar();carregarMeta();const ch=sb.channel("f2").on("postgres_changes",{event:"*",schema:"public",table:"missoes_modelo"},carregar).on("postgres_changes",{event:"*",schema:"public",table:"checkins"},carregar).subscribe();return function(){sb.removeChannel(ch);};},[]);
  useEffect(function(){ if(!pai&&props.nome){ if(filhaAtiva!==props.nome)setFilhaAtiva(props.nome); return; } if(modelos.length){ const fs=[]; modelos.forEach(function(m){ if(m.responsavel&&fs.indexOf(m.responsavel)<0)fs.push(m.responsavel); }); if(fs.length&&fs.indexOf(filhaAtiva)<0)setFilhaAtiva(fs[0]); } },[modelos,props.nome]);

  const setF=function(k,v){setN(function(p){const o=Object.assign({},p);o[k]=v;return o;});};

  const toggleDia=function(d){setN(function(p){var arr=p.dias.slice();var i=arr.indexOf(d);if(i>=0)arr.splice(i,1);else arr.push(d);if(arr.length===0)arr=[d];return Object.assign({},p,{dias:arr});});};

  const diasArr=function(m){ if(!m.dias) return [0,1,2,3,4,5,6]; return String(m.dias).split(",").map(Number); };
  const valeHoje=function(m){ if(m.frequencia==="semanal") return true; return diasArr(m).indexOf(diaSem)>=0; };
  const rotuloDias=function(m){ if(m.frequencia==="semanal"||!m.dias) return ""; var a=diasArr(m); if(a.length===7) return ""; return a.map(function(d){return DIAS_ABREV[d];}).join(", "); };
  const checksDe=function(id){return checks.filter(function(cc){return cc.modelo_id===id;});};

  function calc(nome){ var ct=0,cf=0,et=0,ef=0; modelos.forEach(function(m){ if(m.responsavel!==nome)return; var sem=(m.frequencia==="semanal"); var dias=sem?1:diasArr(m).length; var poss=(m.pontos||0)*dias; var feitos=sem?(feitoSemana(m.id)?1:0):Math.min(diasFeitos(m.id),diasArr(m).length); var pts=(m.pontos||0)*feitos; if(m.categoria==="Extra"){et+=poss;ef+=pts;} else {ct+=poss;cf+=pts;} }); var basePct=ct?cf/ct:0; var totalPct=ct?(cf+ef)/ct:0; var destr=basePct>=0.8; var mesada=(!valor||!ct)?null:(destr?Math.min(totalPct,1.2)*valor:0); return {ct:ct,cf:cf,ef:ef,basePct:basePct,totalPct:totalPct,destr:destr,mesada:mesada}; }
  function calcDia(nome){ var ct=0,cf=0,et=0,ef=0; modelos.forEach(function(m){ if(m.responsavel!==nome)return; if(m.frequencia==="semanal")return; if(!valeHoje(m))return; var p=m.pontos||0; var done=feitoHoje(m.id)?1:0; if(m.categoria==="Extra"){et+=p;ef+=p*done;} else {ct+=p;cf+=p*done;} }); var basePct=ct?cf/ct:0; var totalPct=ct?(cf+ef)/ct:0; var destr=basePct>=0.8; return {ct:ct,basePct:basePct,totalPct:totalPct,destr:destr}; }

function Inicio(props){
  const nome=props.nome;
  const pai=(props.papel==="pai"||props.papel==="mae");
  const [futuros,setFuturos]=useState(null),[hojeFeito,setHojeFeito]=useState(null),[hojeTotal,setHojeTotal]=useState(null);
  useEffect(function(){
    const hojeISO=new Date().toISOString().slice(0,10);
    sb.from("eventos").select("data").then(function(r){if(r.data)setFuturos(r.data.filter(function(e){return (e.data||"")>=hojeISO;}).length);});
    const semana=semanaAtual(), hd=hojeLocal(), ds=new Date().getDay();
    sb.from("missoes_modelo").select("*").eq("ativa",true).or("recorrente.eq.true,semana.eq."+semana).then(function(rm){
      var mods=(rm.data||[]).filter(function(m){
        if(m.frequencia==="semanal")return false;
        if(!pai && nome && m.responsavel!==nome)return false;
        var dd=m.dias?String(m.dias).split(",").map(Number):[0,1,2,3,4,5,6];
        return dd.indexOf(ds)>=0;
      });
      setHojeTotal(mods.length);
      sb.from("checkins").select("modelo_id,dia").eq("dia",hd).then(function(rc){
        var ids={}; (rc.data||[]).forEach(function(cc){ids[cc.modelo_id]=1;});
        setHojeFeito(mods.filter(function(m){return ids[m.id];}).length);
      });
    });
  },[]);
  const ag=futuros===null?"…":(futuros>0?(futuros+(futuros===1?" evento próximo":" eventos próximos")):"Nada marcado ainda");
  const ms=hojeTotal===null?"…":(hojeTotal===0?"Sem missões hoje":(hojeFeito>=hojeTotal?"Tudo feito hoje! 🎉":hojeFeito+"/"+hojeTotal+" missões hoje"));
  const dias=["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  const meses=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  const dt=new Date(),h=dt.getHours();
  const ext=dias[dt.getDay()]+" · "+dt.getDate()+" de "+meses[dt.getMonth()];
  const saud=(h<12?"Bom dia":(h<18?"Boa tarde":"Boa noite"))+((nome&&nome.indexOf("@")<0)?(", "+String(nome).trim().split(" ")[0]):"")+"!";
  return html`
    <div className="wrap" style=${{paddingBottom:28}}>
      <div style=${{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:26}}>
        <div className="eyebrow" style=${{display:"flex",alignItems:"center",gap:7}}><span style=${{fontSize:15}}>🏠</span>Hub da Família</div>
        <button className="btn btn-ghost" style=${{padding:"7px 12px",fontSize:13}} onClick=${props.sair}>Sair</button>
      </div>
      <div className="anim">
        <div className="eyebrow">${ext}</div>
        <div className="h1" style=${{fontSize:34,marginTop:8}}>${saud}</div>
        <div className="note" style=${{marginTop:6,fontSize:14}}>O que a família vai organizar hoje?</div>
      </div>
      <div style=${{display:"flex",flexDirection:"column",gap:14,marginTop:24}}>
        <button className="capa-portal anim" style=${{animationDelay:".08s",background:"linear-gradient(150deg,#2E8B83,#256e68)"}} onClick=${function(){props.ir("agenda");}}>
          <div className="pt-bolha"></div>
          <div className="pt-seta">→</div>
          <div style=${{position:"relative",zIndex:1}}>
            <div className="pt-emoji">📅</div>
            <div className="pt-tit">Agenda</div>
            <div className="pt-desc">Eventos e festas da família</div>
            <div className="pt-dado">${ag}</div>
          </div>
        </button>
        <button className="capa-portal anim" style=${{animationDelay:".16s",background:"linear-gradient(150deg,#EC6A4C,#d4533a)"}} onClick=${function(){props.ir("missoes");}}>
          <div className="pt-bolha"></div>
          <div className="pt-seta">→</div>
          <div style=${{position:"relative",zIndex:1}}>
            <div className="pt-emoji">🎯</div>
            <div className="pt-tit">Missões</div>
            <div className="pt-desc">Tarefas, pontos e mesada</div>
            <div className="pt-dado">${ms}</div>
          </div>
        </button>
      </div>
    </div>`;
}

function App(){
  const [sessao,setSessao]=useState(undefined);
  const [papel,setPapel]=useState("filha");
  const [nome,setNome]=useState("");
  const [aba,setAba]=useState("inicio");
  const [toastMsg,setToastMsg]=useState("");
  const toast=function(m){setToastMsg(m);setTimeout(function(){setToastMsg("");},3500);};
  useEffect(function(){
    sb.auth.getSession().then(function(r){setSessao(r.data.session);}).catch(function(){setSessao(null);});
    const sub=sb.auth.onAuthStateChange(function(_e,s){setSessao(s);});
    return function(){ if(sub&&sub.data&&sub.data.subscription) sub.data.subscription.unsubscribe(); };
  },[]);
  useEffect(function(){ if(sessao){ sb.from("membros").select("papel,nome").eq("id",sessao.user.id).single().then(function(r){if(r.data){setPapel(r.data.papel);setNome(r.data.nome||"");}}); } },[sessao]);
  if(sessao===undefined) return html`<div className="wrap" style=${{paddingTop:80,textAlign:"center",color:"#857A8C"}}>Carregando…</div>`;
  if(!sessao) return html`<div><${Login} toast=${toast}/>${toastMsg?html`<div className="toast">${toastMsg}</div>`:null}</div>`;
  if(aba==="inicio") return html`<div><${Inicio} papel=${papel} nome=${nome} toast=${toast} ir=${function(a){setAba(a);}} sair=${function(){sb.auth.signOut();}}/>${toastMsg?html`<div className="toast">${toastMsg}</div>`:null}</div>`;
  return html`
    <div>
      <div style=${{maxWidth:560,margin:"0 auto",padding:"14px 18px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick=${function(){setAba("inicio");}} style=${{display:"flex",alignItems:"center",gap:8,background:"none",border:"none",cursor:"pointer",padding:0}}><span style=${{fontSize:20,color:"#2A2233",lineHeight:1}}>←</span><span className="eyebrow" style=${{display:"flex",alignItems:"center",gap:7}}><span style=${{fontSize:14}}>🏠</span>Hub da Família</span></button>
        <button className="btn btn-ghost" style=${{padding:"7px 12px",fontSize:13}} onClick=${function(){sb.auth.signOut();}}>Sair</button>
      </div>
      ${aba==="agenda"?html`<${Agenda} toast=${toast}/>`:html`<${Missoes} papel=${papel} nome=${nome} toast=${toast}/>`}
      <div className="tabs">
        <button className=${"tab"+(aba==="inicio"?" on":"")} onClick=${function(){setAba("inicio");}}>🏠<br/>Início</button>
        <button className=${"tab"+(aba==="agenda"?" on":"")} onClick=${function(){setAba("agenda");}}>📅<br/>Agenda</button>
        <button className=${"tab"+(aba==="missoes"?" on":"")} onClick=${function(){setAba("missoes");}}>✅<br/>Missões</button>
      </div>
      ${toastMsg?html`<div className="toast">${toastMsg}</div>`:null}
    </div>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(html`<${App}/>`);
} catch(err){ window.__erros.push('App: '+(err&&err.message?err.message:err)); window.__banner&&window.__banner(); }
</script>
</body>
</html>
